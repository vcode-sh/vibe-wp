name: Installer Release

on:
  push:
    tags:
      - "installer-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version without the v prefix, for example 0.1.0"
        required: true

permissions:
  contents: write

env:
  DOKPLOY_DEPLOY_BRANCH: dokploy/wp-vcode-bootstrap
  PUBLIC_BASE_URL: https://wp.vcode.sh

jobs:
  build:
    name: Build installer (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            build-script: build:linux-x64
            artifact: vibe-wp-installer-linux-x64
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            build-script: build:linux-arm64
            artifact: vibe-wp-installer-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="installer-v$version"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#installer-v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: installer
        run: bun install --frozen-lockfile

      - name: Check release version
        run: |
          package_version=$(node -e 'console.log(require("./installer/package.json").version)')
          if [ "$package_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version ${{ steps.version.outputs.version }} does not match installer/package.json $package_version." >&2
            exit 1
          fi

      - name: Quality gate
        working-directory: installer
        run: bun run quality

      - name: Compile installer
        working-directory: installer
        run: bun run ${{ matrix.build-script }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: installer/dist/${{ matrix.artifact }}

  release:
    name: Publish release and Dokploy deploy branch
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="installer-v$version"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#installer-v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: vibe-wp-installer-linux-x64
          path: installer/dist

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: vibe-wp-installer-linux-arm64
          path: installer/dist

      - name: Build public installer site
        env:
          VIBE_WP_INSTALLER_BASE_URL: ${{ env.PUBLIC_BASE_URL }}
        run: public-install/build-site.sh "${{ steps.version.outputs.version }}"

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          assets_dir="public-install/site/releases/$VERSION"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$assets_dir"/* public-install/site/install.sh --clobber
          else
            gh release create "$TAG_NAME" "$assets_dir"/* public-install/site/install.sh \
              --title "Vibe WP Installer $VERSION" \
              --notes "Vibe WP installer release $VERSION." \
              --target "$GITHUB_SHA"
          fi

      - name: Publish Dokploy deploy branch
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_BRANCH: ${{ env.DOKPLOY_DEPLOY_BRANCH }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          deploy_dir="$(mktemp -d)"

          cp public-install/Dockerfile "$deploy_dir/Dockerfile"
          cp public-install/nginx.conf "$deploy_dir/nginx.conf"
          cp -R public-install/site "$deploy_dir/site"

          {
            printf "%s\n\n" "# Vibe WP Installer Site"
            printf "%s\n" "This branch is generated by the Installer Release workflow."
            printf "%s\n" "It contains the static assets for Vibe WP installer version $VERSION."
            printf "%s\n" "Do not edit this branch by hand."
          } > "$deploy_dir/README.md"

          git -C "$deploy_dir" init
          git -C "$deploy_dir" checkout -b "$DEPLOY_BRANCH"
          git -C "$deploy_dir" config user.name "github-actions[bot]"
          git -C "$deploy_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$deploy_dir" add .
          git -C "$deploy_dir" commit -m "Publish Vibe WP installer site $VERSION"
          git -C "$deploy_dir" push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:$DEPLOY_BRANCH"
