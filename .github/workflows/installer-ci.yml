name: Installer CI

on:
  pull_request:
    paths:
      - "installer/**"
      - "public-install/**"
      - ".github/workflows/installer-ci.yml"
  push:
    branches:
      - main
    paths:
      - "installer/**"
      - "public-install/**"
      - ".github/workflows/installer-ci.yml"

jobs:
  installer:
    name: Installer quality and compile (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            build-script: build:linux-x64
            artifact: vibe-wp-installer-linux-x64
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            build-script: build:linux-arm64
            artifact: vibe-wp-installer-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: installer
        run: bun install --frozen-lockfile

      - name: Quality gate
        working-directory: installer
        run: bun run quality

      - name: Compile installer
        working-directory: installer
        run: bun run ${{ matrix.build-script }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: installer/dist/${{ matrix.artifact }}

  public-site:
    name: Build public installer site
    runs-on: ubuntu-latest
    needs: installer
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: vibe-wp-installer-linux-x64
          path: installer/dist

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: vibe-wp-installer-linux-arm64
          path: installer/dist

      - name: Build public installer site
        run: public-install/build-site.sh 0.1.0-ci
