services:
  nginx:
    environment:
      NGINX_ENABLE_HSTS: ${NGINX_ENABLE_HSTS:-0}
      NGINX_FASTCGI_CACHE_TTL: ${NGINX_FASTCGI_CACHE_TTL:-5m}
      NGINX_FASTCGI_CACHE_INACTIVE: ${NGINX_FASTCGI_CACHE_INACTIVE:-30m}

  wordpress:
    environment:
      WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-staging}
      FORCE_SSL_ADMIN: ${FORCE_SSL_ADMIN:-1}
      DISALLOW_FILE_EDIT: ${DISALLOW_FILE_EDIT:-1}
      DISALLOW_FILE_MODS: ${DISALLOW_FILE_MODS:-0}
      WP_AUTO_UPDATE_CORE: ${WP_AUTO_UPDATE_CORE:-false}
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
      PHP_OPCACHE_REVALIDATE_FREQ: ${PHP_OPCACHE_REVALIDATE_FREQ:-30}
      VIBE_WP_FORCE_NOINDEX: ${VIBE_WP_FORCE_NOINDEX:-1}
      VIBE_WP_DISABLE_OUTBOUND_MAIL: ${VIBE_WP_DISABLE_OUTBOUND_MAIL:-1}
    volumes:
      - wp_content:/var/www/html/wp-content

  cron:
    environment:
      WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-staging}
      FORCE_SSL_ADMIN: ${FORCE_SSL_ADMIN:-1}
      DISALLOW_FILE_EDIT: ${DISALLOW_FILE_EDIT:-1}
      DISALLOW_FILE_MODS: ${DISALLOW_FILE_MODS:-0}
      WP_AUTO_UPDATE_CORE: ${WP_AUTO_UPDATE_CORE:-false}
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
      PHP_OPCACHE_REVALIDATE_FREQ: ${PHP_OPCACHE_REVALIDATE_FREQ:-30}
      VIBE_WP_FORCE_NOINDEX: ${VIBE_WP_FORCE_NOINDEX:-1}
      VIBE_WP_DISABLE_OUTBOUND_MAIL: ${VIBE_WP_DISABLE_OUTBOUND_MAIL:-1}
    volumes:
      - wp_content:/var/www/html/wp-content

  wp:
    environment:
      WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-staging}
      FORCE_SSL_ADMIN: ${FORCE_SSL_ADMIN:-1}
      DISALLOW_FILE_EDIT: ${DISALLOW_FILE_EDIT:-1}
      DISALLOW_FILE_MODS: ${DISALLOW_FILE_MODS:-0}
      WP_AUTO_UPDATE_CORE: ${WP_AUTO_UPDATE_CORE:-false}
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
      PHP_OPCACHE_REVALIDATE_FREQ: ${PHP_OPCACHE_REVALIDATE_FREQ:-30}
      VIBE_WP_FORCE_NOINDEX: ${VIBE_WP_FORCE_NOINDEX:-1}
      VIBE_WP_DISABLE_OUTBOUND_MAIL: ${VIBE_WP_DISABLE_OUTBOUND_MAIL:-1}
    volumes:
      - wp_content:/var/www/html/wp-content

volumes:
  wp_content:
