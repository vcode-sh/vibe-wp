name: ${COMPOSE_PROJECT_NAME:-vibe-wp}

x-wordpress-build: &wordpress-build
  context: ./docker/wordpress
  args:
    WORDPRESS_IMAGE: ${WORDPRESS_IMAGE:-wordpress:7.0-php8.5-fpm}

x-wordpress-content-rw: &wordpress-content-rw
  - type: bind
    source: ./content
    target: /var/www/html/wp-content

x-wordpress-content-ro: &wordpress-content-ro
  - type: bind
    source: ./content
    target: /var/www/html/wp-content
    read_only: true

x-wordpress-environment: &wordpress-environment
  WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-db:3306}
  WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
  WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
  WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-change-me}
  WORDPRESS_DB_CHARSET: ${WORDPRESS_DB_CHARSET:-utf8mb4}
  WORDPRESS_DB_COLLATE: ${WORDPRESS_DB_COLLATE:-}
  WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
  WORDPRESS_AUTH_KEY: ${WORDPRESS_AUTH_KEY:-change-me}
  WORDPRESS_SECURE_AUTH_KEY: ${WORDPRESS_SECURE_AUTH_KEY:-change-me}
  WORDPRESS_LOGGED_IN_KEY: ${WORDPRESS_LOGGED_IN_KEY:-change-me}
  WORDPRESS_NONCE_KEY: ${WORDPRESS_NONCE_KEY:-change-me}
  WORDPRESS_AUTH_SALT: ${WORDPRESS_AUTH_SALT:-change-me}
  WORDPRESS_SECURE_AUTH_SALT: ${WORDPRESS_SECURE_AUTH_SALT:-change-me}
  WORDPRESS_LOGGED_IN_SALT: ${WORDPRESS_LOGGED_IN_SALT:-change-me}
  WORDPRESS_NONCE_SALT: ${WORDPRESS_NONCE_SALT:-change-me}
  WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-}
  WORDPRESS_CONFIG_EXTRA: ${WORDPRESS_CONFIG_EXTRA:-}
  WP_HOME: ${WP_HOME:-http://localhost:8080}
  WP_SITEURL: ${WP_SITEURL:-http://localhost:8080}
  WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-local}
  WP_DEBUG_LOG: ${WP_DEBUG_LOG:-0}
  WP_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY:-0}
  SCRIPT_DEBUG: ${SCRIPT_DEBUG:-0}
  WP_CACHE: ${WP_CACHE:-1}
  WP_MEMORY_LIMIT: ${WP_MEMORY_LIMIT:-256M}
  WP_MAX_MEMORY_LIMIT: ${WP_MAX_MEMORY_LIMIT:-512M}
  FORCE_SSL_ADMIN: ${FORCE_SSL_ADMIN:-0}
  DISABLE_WP_CRON: ${DISABLE_WP_CRON:-1}
  DISALLOW_FILE_EDIT: ${DISALLOW_FILE_EDIT:-1}
  DISALLOW_FILE_MODS: ${DISALLOW_FILE_MODS:-0}
  AUTOMATIC_UPDATER_DISABLED: ${AUTOMATIC_UPDATER_DISABLED:-0}
  WP_AUTO_UPDATE_CORE: ${WP_AUTO_UPDATE_CORE:-minor}
  FS_METHOD: ${FS_METHOD:-direct}
  FS_CHMOD_DIR: ${FS_CHMOD_DIR:-0755}
  FS_CHMOD_FILE: ${FS_CHMOD_FILE:-0644}
  EMPTY_TRASH_DAYS: ${EMPTY_TRASH_DAYS:-14}
  WP_POST_REVISIONS: ${WP_POST_REVISIONS:-10}
  WP_CONTENT_FIX_PERMISSIONS: ${WP_CONTENT_FIX_PERMISSIONS:-1}
  WP_REDIS_HOST: ${WP_REDIS_HOST:-redis}
  WP_REDIS_PORT: ${WP_REDIS_PORT:-6379}
  WP_REDIS_PASSWORD: ${WP_REDIS_PASSWORD:-${REDIS_PASSWORD:-change-me}}
  WP_REDIS_DATABASE: ${WP_REDIS_DATABASE:-0}
  WP_REDIS_PREFIX: ${WP_REDIS_PREFIX:-vibe-wp:}
  WP_CACHE_KEY_SALT: ${WP_CACHE_KEY_SALT:-vibe-wp:}
  WP_REDIS_TIMEOUT: ${WP_REDIS_TIMEOUT:-1}
  WP_REDIS_READ_TIMEOUT: ${WP_REDIS_READ_TIMEOUT:-1}
  WP_REDIS_CLIENT: ${WP_REDIS_CLIENT:-phpredis}
  WP_REDIS_IGBINARY: ${WP_REDIS_IGBINARY:-0}
  PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-256M}
  PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-128M}
  PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-128M}
  PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-120}
  PHP_MAX_INPUT_TIME: ${PHP_MAX_INPUT_TIME:-120}
  PHP_MAX_INPUT_VARS: ${PHP_MAX_INPUT_VARS:-5000}
  PHP_REALPATH_CACHE_SIZE: ${PHP_REALPATH_CACHE_SIZE:-4096K}
  PHP_REALPATH_CACHE_TTL: ${PHP_REALPATH_CACHE_TTL:-600}
  PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE:-1}
  PHP_OPCACHE_ENABLE_CLI: ${PHP_OPCACHE_ENABLE_CLI:-1}
  PHP_OPCACHE_MEMORY_CONSUMPTION: ${PHP_OPCACHE_MEMORY_CONSUMPTION:-256}
  PHP_OPCACHE_INTERNED_STRINGS_BUFFER: ${PHP_OPCACHE_INTERNED_STRINGS_BUFFER:-32}
  PHP_OPCACHE_MAX_ACCELERATED_FILES: ${PHP_OPCACHE_MAX_ACCELERATED_FILES:-65000}
  PHP_OPCACHE_VALIDATE_TIMESTAMPS: ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
  PHP_OPCACHE_REVALIDATE_FREQ: ${PHP_OPCACHE_REVALIDATE_FREQ:-2}
  PHP_OPCACHE_JIT: ${PHP_OPCACHE_JIT:-0}
  PHP_OPCACHE_JIT_BUFFER_SIZE: ${PHP_OPCACHE_JIT_BUFFER_SIZE:-0}
  PHP_FPM_PM: ${PHP_FPM_PM:-dynamic}
  PHP_FPM_PM_MAX_CHILDREN: ${PHP_FPM_PM_MAX_CHILDREN:-24}
  PHP_FPM_PM_START_SERVERS: ${PHP_FPM_PM_START_SERVERS:-4}
  PHP_FPM_PM_MIN_SPARE_SERVERS: ${PHP_FPM_PM_MIN_SPARE_SERVERS:-2}
  PHP_FPM_PM_MAX_SPARE_SERVERS: ${PHP_FPM_PM_MAX_SPARE_SERVERS:-8}
  PHP_FPM_PM_MAX_REQUESTS: ${PHP_FPM_PM_MAX_REQUESTS:-500}
  PHP_FPM_REQUEST_TERMINATE_TIMEOUT: ${PHP_FPM_REQUEST_TERMINATE_TIMEOUT:-120s}
  PHP_FPM_PM_PROCESS_IDLE_TIMEOUT: ${PHP_FPM_PM_PROCESS_IDLE_TIMEOUT:-10s}

services:
  nginx:
    image: ${NGINX_RUNTIME_IMAGE:-vibe-wp-nginx}
    build:
      context: ./docker/nginx
      args:
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.29-alpine}
        WORDPRESS_IMAGE: ${WORDPRESS_IMAGE:-wordpress:7.0-php8.5-fpm}
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-128m}
      NGINX_CLIENT_BODY_BUFFER_SIZE: ${NGINX_CLIENT_BODY_BUFFER_SIZE:-256k}
      NGINX_WORKER_CONNECTIONS: ${NGINX_WORKER_CONNECTIONS:-4096}
      NGINX_KEEPALIVE_TIMEOUT: ${NGINX_KEEPALIVE_TIMEOUT:-65s}
      NGINX_KEEPALIVE_REQUESTS: ${NGINX_KEEPALIVE_REQUESTS:-1000}
      NGINX_CLIENT_HEADER_TIMEOUT: ${NGINX_CLIENT_HEADER_TIMEOUT:-15s}
      NGINX_CLIENT_BODY_TIMEOUT: ${NGINX_CLIENT_BODY_TIMEOUT:-60s}
      NGINX_SEND_TIMEOUT: ${NGINX_SEND_TIMEOUT:-30s}
      NGINX_ACCESS_LOG: ${NGINX_ACCESS_LOG:-1}
      NGINX_GZIP: ${NGINX_GZIP:-on}
      NGINX_GZIP_COMP_LEVEL: ${NGINX_GZIP_COMP_LEVEL:-5}
      NGINX_GZIP_MIN_LENGTH: ${NGINX_GZIP_MIN_LENGTH:-1024}
      NGINX_OPEN_FILE_CACHE: ${NGINX_OPEN_FILE_CACHE:-on}
      NGINX_OPEN_FILE_CACHE_MAX: ${NGINX_OPEN_FILE_CACHE_MAX:-10000}
      NGINX_OPEN_FILE_CACHE_INACTIVE: ${NGINX_OPEN_FILE_CACHE_INACTIVE:-60s}
      NGINX_OPEN_FILE_CACHE_VALID: ${NGINX_OPEN_FILE_CACHE_VALID:-120s}
      NGINX_OPEN_FILE_CACHE_MIN_USES: ${NGINX_OPEN_FILE_CACHE_MIN_USES:-2}
      NGINX_OPEN_FILE_CACHE_ERRORS: ${NGINX_OPEN_FILE_CACHE_ERRORS:-off}
      NGINX_STATIC_CACHE_CONTROL: ${NGINX_STATIC_CACHE_CONTROL:-public,max-age=2592000}
      NGINX_FASTCGI_CACHE_KEYS_ZONE_SIZE: ${NGINX_FASTCGI_CACHE_KEYS_ZONE_SIZE:-128m}
      NGINX_FASTCGI_CACHE_TTL: ${NGINX_FASTCGI_CACHE_TTL:-10m}
      NGINX_FASTCGI_REDIRECT_CACHE_TTL: ${NGINX_FASTCGI_REDIRECT_CACHE_TTL:-1m}
      NGINX_FASTCGI_CACHE_INACTIVE: ${NGINX_FASTCGI_CACHE_INACTIVE:-30m}
      NGINX_FASTCGI_CACHE_MAX_SIZE: ${NGINX_FASTCGI_CACHE_MAX_SIZE:-1g}
      NGINX_FASTCGI_CACHE_MIN_USES: ${NGINX_FASTCGI_CACHE_MIN_USES:-1}
      NGINX_FASTCGI_CACHE_LOCK_TIMEOUT: ${NGINX_FASTCGI_CACHE_LOCK_TIMEOUT:-10s}
      NGINX_FASTCGI_CONNECT_TIMEOUT: ${NGINX_FASTCGI_CONNECT_TIMEOUT:-10s}
      NGINX_FASTCGI_SEND_TIMEOUT: ${NGINX_FASTCGI_SEND_TIMEOUT:-120s}
      NGINX_FASTCGI_READ_TIMEOUT: ${NGINX_FASTCGI_READ_TIMEOUT:-120s}
      NGINX_ENABLE_HSTS: ${NGINX_ENABLE_HSTS:-0}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - type: bind
        source: ./content
        target: /var/www/html/wp-content
        read_only: true
      - nginx_cache:/var/cache/nginx/wordpress
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend

  wordpress:
    image: ${WORDPRESS_RUNTIME_IMAGE:-vibe-wp-wordpress}
    build: *wordpress-build
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *wordpress-environment
    expose:
      - "9000"
    volumes: *wordpress-content-rw
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  cron:
    image: ${WORDPRESS_RUNTIME_IMAGE:-vibe-wp-wordpress}
    build: *wordpress-build
    init: true
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    command: ["/usr/local/bin/vibe-wp-cron.sh"]
    environment:
      <<: *wordpress-environment
      WP_CRON_INTERVAL: ${WP_CRON_INTERVAL:-60}
    volumes: *wordpress-content-rw
    networks:
      - backend

  db:
    image: ${MARIADB_RUNTIME_IMAGE:-vibe-wp-mariadb}
    build:
      context: ./docker/mariadb
      args:
        MARIADB_IMAGE: ${MARIADB_IMAGE:-mariadb:12.3}
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-wordpress}
      MARIADB_USER: ${MARIADB_USER:-wordpress}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-me}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-me}
      MARIADB_AUTO_UPGRADE: ${MARIADB_AUTO_UPGRADE:-1}
      MARIADB_CHARACTER_SET_SERVER: ${MARIADB_CHARACTER_SET_SERVER:-utf8mb4}
      MARIADB_COLLATION_SERVER: ${MARIADB_COLLATION_SERVER:-utf8mb4_unicode_ci}
      MARIADB_MAX_ALLOWED_PACKET: ${MARIADB_MAX_ALLOWED_PACKET:-256M}
      MARIADB_MAX_CONNECTIONS: ${MARIADB_MAX_CONNECTIONS:-150}
      MARIADB_THREAD_CACHE_SIZE: ${MARIADB_THREAD_CACHE_SIZE:-100}
      MARIADB_TABLE_OPEN_CACHE: ${MARIADB_TABLE_OPEN_CACHE:-4000}
      MARIADB_TABLE_DEFINITION_CACHE: ${MARIADB_TABLE_DEFINITION_CACHE:-2000}
      MARIADB_OPEN_FILES_LIMIT: ${MARIADB_OPEN_FILES_LIMIT:-65535}
      MARIADB_TMP_TABLE_SIZE: ${MARIADB_TMP_TABLE_SIZE:-64M}
      MARIADB_MAX_HEAP_TABLE_SIZE: ${MARIADB_MAX_HEAP_TABLE_SIZE:-64M}
      MARIADB_SORT_BUFFER_SIZE: ${MARIADB_SORT_BUFFER_SIZE:-2M}
      MARIADB_JOIN_BUFFER_SIZE: ${MARIADB_JOIN_BUFFER_SIZE:-2M}
      MARIADB_READ_BUFFER_SIZE: ${MARIADB_READ_BUFFER_SIZE:-1M}
      MARIADB_READ_RND_BUFFER_SIZE: ${MARIADB_READ_RND_BUFFER_SIZE:-2M}
      MARIADB_ARIA_PAGECACHE_BUFFER_SIZE: ${MARIADB_ARIA_PAGECACHE_BUFFER_SIZE:-128M}
      MARIADB_INNODB_BUFFER_POOL_SIZE: ${MARIADB_INNODB_BUFFER_POOL_SIZE:-256M}
      MARIADB_INNODB_LOG_FILE_SIZE: ${MARIADB_INNODB_LOG_FILE_SIZE:-256M}
      MARIADB_INNODB_LOG_BUFFER_SIZE: ${MARIADB_INNODB_LOG_BUFFER_SIZE:-16M}
      MARIADB_INNODB_FLUSH_LOG_AT_TRX_COMMIT: ${MARIADB_INNODB_FLUSH_LOG_AT_TRX_COMMIT:-1}
      MARIADB_INNODB_LINUX_AIO: ${MARIADB_INNODB_LINUX_AIO:-aio}
      MARIADB_INNODB_FLUSH_NEIGHBORS: ${MARIADB_INNODB_FLUSH_NEIGHBORS:-0}
      MARIADB_INNODB_IO_CAPACITY: ${MARIADB_INNODB_IO_CAPACITY:-400}
      MARIADB_INNODB_IO_CAPACITY_MAX: ${MARIADB_INNODB_IO_CAPACITY_MAX:-2000}
      MARIADB_INNODB_READ_IO_THREADS: ${MARIADB_INNODB_READ_IO_THREADS:-4}
      MARIADB_INNODB_WRITE_IO_THREADS: ${MARIADB_INNODB_WRITE_IO_THREADS:-4}
      MARIADB_INNODB_PURGE_THREADS: ${MARIADB_INNODB_PURGE_THREADS:-4}
      MARIADB_INNODB_STATS_PERSISTENT: ${MARIADB_INNODB_STATS_PERSISTENT:-ON}
      MARIADB_INNODB_BUFFER_POOL_DUMP_AT_SHUTDOWN: ${MARIADB_INNODB_BUFFER_POOL_DUMP_AT_SHUTDOWN:-ON}
      MARIADB_INNODB_BUFFER_POOL_LOAD_AT_STARTUP: ${MARIADB_INNODB_BUFFER_POOL_LOAD_AT_STARTUP:-ON}
      MARIADB_INNODB_BUFFER_POOL_DUMP_PCT: ${MARIADB_INNODB_BUFFER_POOL_DUMP_PCT:-25}
      MARIADB_PERFORMANCE_SCHEMA: ${MARIADB_PERFORMANCE_SCHEMA:-OFF}
      MARIADB_SLOW_QUERY_LOG: ${MARIADB_SLOW_QUERY_LOG:-OFF}
      MARIADB_SLOW_QUERY_LOG_FILE: ${MARIADB_SLOW_QUERY_LOG_FILE:-/var/lib/mysql/mariadb-slow.log}
      MARIADB_LONG_QUERY_TIME: ${MARIADB_LONG_QUERY_TIME:-2}
      MARIADB_MIN_EXAMINED_ROW_LIMIT: ${MARIADB_MIN_EXAMINED_ROW_LIMIT:-100}
      MARIADB_LOG_QUERIES_NOT_USING_INDEXES: ${MARIADB_LOG_QUERIES_NOT_USING_INDEXES:-OFF}
    ulimits:
      nofile:
        soft: ${MARIADB_NOFILE_SOFT_LIMIT:-1048576}
        hard: ${MARIADB_NOFILE_HARD_LIMIT:-1048576}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-256mb}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    command:
      - sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}" --maxmemory "$${REDIS_MAXMEMORY}" --maxmemory-policy "$${REDIS_MAXMEMORY_POLICY}"
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  wp:
    profiles:
      - tools
    image: ${WORDPRESS_RUNTIME_IMAGE:-vibe-wp-wordpress}
    build: *wordpress-build
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/vibe-wp-entrypoint.sh", "wp", "--path=/var/www/html"]
    command: ["--info"]
    environment:
      <<: *wordpress-environment
    volumes: *wordpress-content-rw
    networks:
      - backend

  adminer:
    profiles:
      - tools
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - backend

volumes:
  db_data:
  redis_data:
  nginx_cache:

networks:
  backend:
    driver: bridge
