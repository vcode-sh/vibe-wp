name: control-panel

services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_SERVER_URL: http://localhost:3000
    init: true
    ports:
      - "3001:80"
    env_file:
      - path: web/.env
        required: false
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    init: true
    ports:
      - "3000:3000"
    env_file:
      - path: server/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:3001
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
