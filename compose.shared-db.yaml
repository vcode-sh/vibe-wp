# Shared-DB mode: WordPress + Nginx + per-site Redis, with the DATABASE provided
# by the ONE shared `vibe-wp-shared-db` MariaDB container (joined via the external
# `vibe-wp-shared-db` network). This is a STANDALONE compose file (selected by
# `bin/vibe shared-db …`, like compose.external.yaml) — it deliberately has NO db
# service (the shared container owns that) but KEEPS a per-site redis container.
#
# Network isolation: only `wordpress`, `cron`, and the on-demand `wp` tool join
# the shared `vibe-wp-shared-db` network; `nginx` and `redis` stay on `backend`.
# The shared MariaDB has no published port, so the DB is reachable ONLY by the
# containers attached to that network. WORDPRESS_DB_HOST=db resolves to the shared
# container's `db` service alias on that network.
name: ${COMPOSE_PROJECT_NAME:-vibe-wp}

x-wordpress-build: &wordpress-build
  context: ./docker/wordpress
  args:
    WORDPRESS_IMAGE: ${WORDPRESS_IMAGE:-wordpress:7.0-php8.5-fpm}

x-wordpress-content-rw: &wordpress-content-rw
  - type: volume
    source: wp_content
    target: /var/www/html/wp-content

x-wordpress-environment: &wordpress-environment
  WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:?WORDPRESS_DB_HOST is required for shared-db mode}
  WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:?WORDPRESS_DB_NAME is required for shared-db mode}
  WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:?WORDPRESS_DB_USER is required for shared-db mode}
  WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?WORDPRESS_DB_PASSWORD is required for shared-db mode}
  WORDPRESS_DB_CHARSET: ${WORDPRESS_DB_CHARSET:-utf8mb4}
  WORDPRESS_DB_COLLATE: ${WORDPRESS_DB_COLLATE:-}
  WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
  WORDPRESS_AUTH_KEY: ${WORDPRESS_AUTH_KEY:?WORDPRESS_AUTH_KEY is required}
  WORDPRESS_SECURE_AUTH_KEY: ${WORDPRESS_SECURE_AUTH_KEY:?WORDPRESS_SECURE_AUTH_KEY is required}
  WORDPRESS_LOGGED_IN_KEY: ${WORDPRESS_LOGGED_IN_KEY:?WORDPRESS_LOGGED_IN_KEY is required}
  WORDPRESS_NONCE_KEY: ${WORDPRESS_NONCE_KEY:?WORDPRESS_NONCE_KEY is required}
  WORDPRESS_AUTH_SALT: ${WORDPRESS_AUTH_SALT:?WORDPRESS_AUTH_SALT is required}
  WORDPRESS_SECURE_AUTH_SALT: ${WORDPRESS_SECURE_AUTH_SALT:?WORDPRESS_SECURE_AUTH_SALT is required}
  WORDPRESS_LOGGED_IN_SALT: ${WORDPRESS_LOGGED_IN_SALT:?WORDPRESS_LOGGED_IN_SALT is required}
  WORDPRESS_NONCE_SALT: ${WORDPRESS_NONCE_SALT:?WORDPRESS_NONCE_SALT is required}
  WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-}
  WORDPRESS_CONFIG_EXTRA: ${WORDPRESS_CONFIG_EXTRA:-}
  WP_HOME: ${WP_HOME:?WP_HOME is required}
  WP_SITEURL: ${WP_SITEURL:?WP_SITEURL is required}
  WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-production}
  WP_DEBUG_LOG: ${WP_DEBUG_LOG:-0}
  WP_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY:-0}
  SCRIPT_DEBUG: ${SCRIPT_DEBUG:-0}
  WP_CACHE: ${WP_CACHE:-1}
  WP_MEMORY_LIMIT: ${WP_MEMORY_LIMIT:-256M}
  WP_MAX_MEMORY_LIMIT: ${WP_MAX_MEMORY_LIMIT:-512M}
  FORCE_SSL_ADMIN: ${FORCE_SSL_ADMIN:-1}
  DISABLE_WP_CRON: ${DISABLE_WP_CRON:-1}
  DISALLOW_FILE_EDIT: ${DISALLOW_FILE_EDIT:-1}
  DISALLOW_FILE_MODS: ${DISALLOW_FILE_MODS:-0}
  AUTOMATIC_UPDATER_DISABLED: ${AUTOMATIC_UPDATER_DISABLED:-0}
  WP_AUTO_UPDATE_CORE: ${WP_AUTO_UPDATE_CORE:-false}
  FS_METHOD: ${FS_METHOD:-direct}
  FS_CHMOD_DIR: ${FS_CHMOD_DIR:-0755}
  FS_CHMOD_FILE: ${FS_CHMOD_FILE:-0644}
  EMPTY_TRASH_DAYS: ${EMPTY_TRASH_DAYS:-14}
  WP_POST_REVISIONS: ${WP_POST_REVISIONS:-10}
  WP_CONTENT_FIX_PERMISSIONS: ${WP_CONTENT_FIX_PERMISSIONS:-1}
  WP_REDIS_HOST: ${WP_REDIS_HOST:-redis}
  WP_REDIS_PORT: ${WP_REDIS_PORT:-6379}
  WP_REDIS_SCHEME: ${WP_REDIS_SCHEME:-tcp}
  WP_REDIS_PATH: ${WP_REDIS_PATH:-}
  WP_REDIS_USERNAME: ${WP_REDIS_USERNAME:-}
  WP_REDIS_PASSWORD: ${WP_REDIS_PASSWORD:-}
  WP_REDIS_DATABASE: ${WP_REDIS_DATABASE:-0}
  WP_REDIS_PREFIX: ${WP_REDIS_PREFIX:?WP_REDIS_PREFIX is required}
  WP_CACHE_KEY_SALT: ${WP_CACHE_KEY_SALT:?WP_CACHE_KEY_SALT is required}
  WP_REDIS_TIMEOUT: ${WP_REDIS_TIMEOUT:-1}
  WP_REDIS_READ_TIMEOUT: ${WP_REDIS_READ_TIMEOUT:-1}
  WP_REDIS_RETRY_INTERVAL: ${WP_REDIS_RETRY_INTERVAL:-100}
  WP_REDIS_CLIENT: ${WP_REDIS_CLIENT:-phpredis}
  WP_REDIS_IGBINARY: ${WP_REDIS_IGBINARY:-0}
  WP_REDIS_MAXTTL: ${WP_REDIS_MAXTTL:-604800}
  WP_REDIS_SELECTIVE_FLUSH: ${WP_REDIS_SELECTIVE_FLUSH:-1}
  WP_REDIS_GRACEFUL: ${WP_REDIS_GRACEFUL:-1}
  WP_REDIS_FLUSH_TIMEOUT: ${WP_REDIS_FLUSH_TIMEOUT:-5}
  WP_REDIS_DISABLE_METRICS: ${WP_REDIS_DISABLE_METRICS:-1}
  WP_REDIS_DISABLE_ADMINBAR: ${WP_REDIS_DISABLE_ADMINBAR:-1}
  WP_REDIS_DISABLE_BANNERS: ${WP_REDIS_DISABLE_BANNERS:-1}
  WP_REDIS_DISABLE_DROPIN_BANNERS: ${WP_REDIS_DISABLE_DROPIN_BANNERS:-1}
  WP_REDIS_DISABLE_COMMENT: ${WP_REDIS_DISABLE_COMMENT:-1}
  WP_REDIS_DISABLE_GROUP_FLUSH: ${WP_REDIS_DISABLE_GROUP_FLUSH:-0}
  WP_REDIS_DISABLED: ${WP_REDIS_DISABLED:-0}
  WP_REDIS_GLOBAL_GROUPS: ${WP_REDIS_GLOBAL_GROUPS:-}
  WP_REDIS_IGNORED_GROUPS: ${WP_REDIS_IGNORED_GROUPS:-}
  WP_REDIS_UNFLUSHABLE_GROUPS: ${WP_REDIS_UNFLUSHABLE_GROUPS:-}
  VIBE_WP_REDIS_EXTRA_GLOBAL_GROUPS: ${VIBE_WP_REDIS_EXTRA_GLOBAL_GROUPS:-}
  VIBE_WP_REDIS_NON_PERSISTENT_GROUPS: ${VIBE_WP_REDIS_NON_PERSISTENT_GROUPS:-}
  VIBE_WP_REDIS_UNFLUSHABLE_GROUPS: ${VIBE_WP_REDIS_UNFLUSHABLE_GROUPS:-}
  VIBE_WP_FORCE_NOINDEX: ${VIBE_WP_FORCE_NOINDEX:-0}
  VIBE_WP_DISABLE_OUTBOUND_MAIL: ${VIBE_WP_DISABLE_OUTBOUND_MAIL:-0}
  VIBE_WP_DISABLE_XMLRPC: ${VIBE_WP_DISABLE_XMLRPC:-0}
  VIBE_WP_INTERNAL_URL: ${VIBE_WP_INTERNAL_URL:-http://nginx:8080}
  # Exposed to the WordPress container (not only nginx) so the Insights mu-plugin
  # can report the page-cache state. nginx reads the same value to actually cache.
  NGINX_FASTCGI_CACHE: ${NGINX_FASTCGI_CACHE:-on}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-256M}
  PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-128M}
  PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-128M}
  PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-120}
  PHP_MAX_INPUT_TIME: ${PHP_MAX_INPUT_TIME:-120}
  PHP_MAX_INPUT_VARS: ${PHP_MAX_INPUT_VARS:-5000}
  PHP_REALPATH_CACHE_SIZE: ${PHP_REALPATH_CACHE_SIZE:-4096K}
  PHP_REALPATH_CACHE_TTL: ${PHP_REALPATH_CACHE_TTL:-600}
  PHP_OPCACHE_ENABLE: ${PHP_OPCACHE_ENABLE:-1}
  PHP_OPCACHE_ENABLE_CLI: ${PHP_OPCACHE_ENABLE_CLI:-1}
  PHP_OPCACHE_MEMORY_CONSUMPTION: ${PHP_OPCACHE_MEMORY_CONSUMPTION:-256}
  PHP_OPCACHE_INTERNED_STRINGS_BUFFER: ${PHP_OPCACHE_INTERNED_STRINGS_BUFFER:-32}
  PHP_OPCACHE_MAX_ACCELERATED_FILES: ${PHP_OPCACHE_MAX_ACCELERATED_FILES:-65000}
  PHP_OPCACHE_VALIDATE_TIMESTAMPS: ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
  PHP_OPCACHE_REVALIDATE_FREQ: ${PHP_OPCACHE_REVALIDATE_FREQ:-60}
  PHP_OPCACHE_JIT: ${PHP_OPCACHE_JIT:-0}
  PHP_OPCACHE_JIT_BUFFER_SIZE: ${PHP_OPCACHE_JIT_BUFFER_SIZE:-0}
  PHP_FPM_PM: ${PHP_FPM_PM:-dynamic}
  PHP_FPM_PM_MAX_CHILDREN: ${PHP_FPM_PM_MAX_CHILDREN:-24}
  PHP_FPM_PM_START_SERVERS: ${PHP_FPM_PM_START_SERVERS:-4}
  PHP_FPM_PM_MIN_SPARE_SERVERS: ${PHP_FPM_PM_MIN_SPARE_SERVERS:-2}
  PHP_FPM_PM_MAX_SPARE_SERVERS: ${PHP_FPM_PM_MAX_SPARE_SERVERS:-8}
  PHP_FPM_PM_MAX_REQUESTS: ${PHP_FPM_PM_MAX_REQUESTS:-500}
  PHP_FPM_REQUEST_TERMINATE_TIMEOUT: ${PHP_FPM_REQUEST_TERMINATE_TIMEOUT:-120s}
  PHP_FPM_PM_PROCESS_IDLE_TIMEOUT: ${PHP_FPM_PM_PROCESS_IDLE_TIMEOUT:-10s}

services:
  nginx:
    image: ${NGINX_RUNTIME_IMAGE:-vibe-wp-nginx}
    build:
      context: ./docker/nginx
      args:
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.29-alpine}
        WORDPRESS_IMAGE: ${WORDPRESS_IMAGE:-wordpress:7.0-php8.5-fpm}
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-128m}
      NGINX_CLIENT_BODY_BUFFER_SIZE: ${NGINX_CLIENT_BODY_BUFFER_SIZE:-256k}
      NGINX_WORKER_CONNECTIONS: ${NGINX_WORKER_CONNECTIONS:-4096}
      NGINX_KEEPALIVE_TIMEOUT: ${NGINX_KEEPALIVE_TIMEOUT:-65s}
      NGINX_KEEPALIVE_REQUESTS: ${NGINX_KEEPALIVE_REQUESTS:-1000}
      NGINX_CLIENT_HEADER_TIMEOUT: ${NGINX_CLIENT_HEADER_TIMEOUT:-15s}
      NGINX_CLIENT_BODY_TIMEOUT: ${NGINX_CLIENT_BODY_TIMEOUT:-60s}
      NGINX_SEND_TIMEOUT: ${NGINX_SEND_TIMEOUT:-30s}
      NGINX_ACCESS_LOG: ${NGINX_ACCESS_LOG:-1}
      NGINX_GZIP: ${NGINX_GZIP:-on}
      NGINX_GZIP_COMP_LEVEL: ${NGINX_GZIP_COMP_LEVEL:-5}
      NGINX_GZIP_MIN_LENGTH: ${NGINX_GZIP_MIN_LENGTH:-1024}
      NGINX_OPEN_FILE_CACHE: ${NGINX_OPEN_FILE_CACHE:-on}
      NGINX_OPEN_FILE_CACHE_MAX: ${NGINX_OPEN_FILE_CACHE_MAX:-10000}
      NGINX_OPEN_FILE_CACHE_INACTIVE: ${NGINX_OPEN_FILE_CACHE_INACTIVE:-60s}
      NGINX_OPEN_FILE_CACHE_VALID: ${NGINX_OPEN_FILE_CACHE_VALID:-120s}
      NGINX_OPEN_FILE_CACHE_MIN_USES: ${NGINX_OPEN_FILE_CACHE_MIN_USES:-2}
      NGINX_OPEN_FILE_CACHE_ERRORS: ${NGINX_OPEN_FILE_CACHE_ERRORS:-on}
      NGINX_STATIC_CACHE_CONTROL: ${NGINX_STATIC_CACHE_CONTROL:-public,max-age=2592000}
      NGINX_FASTCGI_CACHE_KEYS_ZONE_SIZE: ${NGINX_FASTCGI_CACHE_KEYS_ZONE_SIZE:-128m}
      NGINX_FASTCGI_CACHE_TTL: ${NGINX_FASTCGI_CACHE_TTL:-10m}
      NGINX_FASTCGI_REDIRECT_CACHE_TTL: ${NGINX_FASTCGI_REDIRECT_CACHE_TTL:-1m}
      NGINX_FASTCGI_CACHE_INACTIVE: ${NGINX_FASTCGI_CACHE_INACTIVE:-60m}
      NGINX_FASTCGI_CACHE_MAX_SIZE: ${NGINX_FASTCGI_CACHE_MAX_SIZE:-2g}
      NGINX_FASTCGI_CACHE_MIN_USES: ${NGINX_FASTCGI_CACHE_MIN_USES:-1}
      NGINX_FASTCGI_CACHE_LOCK_TIMEOUT: ${NGINX_FASTCGI_CACHE_LOCK_TIMEOUT:-10s}
      NGINX_FASTCGI_CONNECT_TIMEOUT: ${NGINX_FASTCGI_CONNECT_TIMEOUT:-10s}
      NGINX_FASTCGI_SEND_TIMEOUT: ${NGINX_FASTCGI_SEND_TIMEOUT:-120s}
      NGINX_FASTCGI_READ_TIMEOUT: ${NGINX_FASTCGI_READ_TIMEOUT:-120s}
      NGINX_ENABLE_HSTS: ${NGINX_ENABLE_HSTS:-1}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - type: volume
        source: wp_content
        target: /var/www/html/wp-content
        read_only: true
      - nginx_cache:/var/cache/nginx/wordpress
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend

  wordpress:
    image: ${WORDPRESS_RUNTIME_IMAGE:-vibe-wp-wordpress}
    build: *wordpress-build
    init: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *wordpress-environment
    expose:
      - "9000"
    volumes: *wordpress-content-rw
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
      - shared_db

  cron:
    image: ${WORDPRESS_RUNTIME_IMAGE:-vibe-wp-wordpress}
    build: *wordpress-build
    init: true
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    command: ["/usr/local/bin/vibe-wp-cron.sh"]
    environment:
      <<: *wordpress-environment
      WP_CRON_INTERVAL: ${WP_CRON_INTERVAL:-60}
    volumes: *wordpress-content-rw
    networks:
      - backend
      - shared_db

  redis:
    image: ${REDIS_RUNTIME_IMAGE:-vibe-wp-redis}
    build:
      context: ./docker/redis
      args:
        REDIS_IMAGE: ${REDIS_IMAGE:-redis:8-alpine}
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
      REDIS_BIND: ${REDIS_BIND:-0.0.0.0}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PROTECTED_MODE: ${REDIS_PROTECTED_MODE:-yes}
      REDIS_DATABASES: ${REDIS_DATABASES:-16}
      REDIS_MAXCLIENTS: ${REDIS_MAXCLIENTS:-10000}
      REDIS_LOGLEVEL: ${REDIS_LOGLEVEL:-notice}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-256mb}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lfu}
      REDIS_APPENDONLY: ${REDIS_APPENDONLY:-no}
      REDIS_SAVE: ${REDIS_SAVE:-}
    ulimits:
      nofile:
        soft: ${REDIS_NOFILE_SOFT_LIMIT:-65535}
        hard: ${REDIS_NOFILE_HARD_LIMIT:-65535}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  wp:
    profiles:
      - tools
    image: ${WORDPRESS_RUNTIME_IMAGE:-vibe-wp-wordpress}
    build: *wordpress-build
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/vibe-wp-entrypoint.sh", "wp", "--path=/var/www/html"]
    command: ["--info"]
    environment:
      <<: *wordpress-environment
    volumes: *wordpress-content-rw
    networks:
      - backend
      - shared_db

volumes:
  wp_content:
  nginx_cache:
  redis_data:

networks:
  backend:
    driver: bridge
  # The shared MariaDB's network, created by the vibe-wp-shared-db project. It
  # MUST already exist (the wizard only offers shared-db when the shared
  # container is initialized + healthy). Only wordpress/cron/wp join it.
  shared_db:
    external: true
    name: vibe-wp-shared-db
